<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>销售工作台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
      background: #f5f6f8;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── 顶栏 ── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-time {
      font-size: 12px;
      color: #999;
    }
    .btn-refresh {
      font-size: 13px;
      color: #1677ff;
      background: none;
      border: 1px solid #1677ff;
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .btn-refresh:active { opacity: 0.7; }
    .btn-refresh.loading .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 内容区 ── */
    .page { padding: 12px 12px 32px; max-width: 640px; margin: 0 auto; }

    /* ── 状态栏 ── */
    .status-bar {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #52c41a;
      flex-shrink: 0;
    }
    .status-dot.loading { background: #faad14; animation: blink 1s ease infinite; }
    .status-dot.error   { background: #ff4d4f; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── 分组标题 ── */
    .group-label {
      font-size: 13px;
      font-weight: 600;
      color: #666;
      margin: 16px 0 8px;
      padding-left: 2px;
    }
    .group-label:first-child { margin-top: 0; }

    /* ── 卡片网格：默认2列，宽屏3列 ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    @media (min-width: 480px) {
      .card-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── 指标卡 ── */
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 14px 12px;
      border: 1px solid #ebebeb;
    }
    .card-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-value {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      display: flex;
      align-items: baseline;
      gap: 3px;
    }
    .card-unit {
      font-size: 13px;
      font-weight: 400;
      color: #aaa;
    }

    /* 商机灯色值 */
    .val-green  { color: #389e0d; }
    .val-yellow { color: #d48806; }
    .val-red    { color: #cf1322; }

    /* 骨架屏 */
    .skeleton {
      display: inline-block;
      width: 52px; height: 26px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px;
      vertical-align: middle;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .val-error { font-size: 18px; color: #bbb; }

    /* ── 销售年度数据表格 ── */
    .sales-table-wrap {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #ebebeb;
      overflow: hidden;
      margin-top: 4px;
    }
    .sales-table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .sales-table-title {
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }
    .sales-year-tag {
      font-size: 12px;
      color: #1677ff;
      background: #e8f4ff;
      border-radius: 4px;
      padding: 2px 8px;
    }
    /* 横向滚动容器 */
    .sales-table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table.sales-table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.sales-table th {
      background: #fafafa;
      color: #888;
      font-weight: 500;
      padding: 9px 12px;
      text-align: right;
      white-space: nowrap;
      border-bottom: 1px solid #f0f0f0;
    }
    table.sales-table th:first-child { text-align: left; }
    table.sales-table td {
      padding: 10px 12px;
      text-align: right;
      color: #333;
      border-bottom: 1px solid #f8f8f8;
      white-space: nowrap;
    }
    table.sales-table td:first-child { text-align: left; font-weight: 500; }
    table.sales-table tr:last-child td { border-bottom: none; }
    table.sales-table tr:hover td { background: #fafafa; }
    .target-null { color: #ccc; font-style: italic; }
    .amount-val { font-weight: 600; color: #1a1a1a; }
    .table-skeleton {
      display: inline-block;
      width: 40px; height: 14px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 3px;
      vertical-align: middle;
    }
    .sales-empty {
      text-align: center;
      color: #bbb;
      padding: 24px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <div class="topbar-title">销售工作台</div>
  <div class="topbar-right">
    <div class="topbar-time" id="topbarTime"></div>
    <button class="btn-refresh" id="btnRefresh" onclick="loadDashboard()">
      <span class="spin" id="spinIcon">↻</span>刷新
    </button>
  </div>
</div>

<!-- 页面内容 -->
<div class="page">

  <!-- 状态 -->
  <div class="status-bar">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">正在加载…</span>
  </div>

  <!-- 客户概览 -->
  <div class="group-label">客户概览</div>
  <div class="card-grid">
    <div class="card">
      <div class="card-label">客户总数</div>
      <div class="card-value"><span id="v-customer-total" class="skeleton"></span><span class="card-unit">个</span></div>
    </div>
    <div class="card">
      <div class="card-label">本月新增客户</div>
      <div class="card-value"><span id="v-customer-new" class="skeleton"></span><span class="card-unit">个</span></div>
    </div>
    <div class="card">
      <div class="card-label">本月客户拜访</div>
      <div class="card-value"><span id="v-visit" class="skeleton"></span><span class="card-unit">次</span></div>
    </div>
    <div class="card">
      <div class="card-label">本月客户宴请</div>
      <div class="card-value"><span id="v-reception" class="skeleton"></span><span class="card-unit">次</span></div>
    </div>
  </div>

  <!-- 线索 & 跟进 -->
  <div class="group-label">线索 · 跟进</div>
  <div class="card-grid">
    <div class="card">
      <div class="card-label">本月线索跟进</div>
      <div class="card-value"><span id="v-clue-followup" class="skeleton"></span><span class="card-unit">次</span></div>
    </div>
    <div class="card">
      <div class="card-label">待处理线索</div>
      <div class="card-value"><span id="v-clue-pending" class="skeleton"></span><span class="card-unit">个</span></div>
    </div>
    <div class="card">
      <div class="card-label">本月商机跟进</div>
      <div class="card-value"><span id="v-opp-followup" class="skeleton"></span><span class="card-unit">次</span></div>
    </div>
  </div>

  <!-- 商机 -->
  <div class="group-label">商机</div>
  <div class="card-grid">
    <div class="card">
      <div class="card-label">在跟商机总数</div>
      <div class="card-value"><span id="v-opp-total" class="skeleton"></span><span class="card-unit">个</span></div>
    </div>
    <div class="card">
      <div class="card-label">本月新增商机</div>
      <div class="card-value"><span id="v-opp-new" class="skeleton"></span><span class="card-unit">个</span></div>
    </div>
    <div class="card">
      <div class="card-label">🟢 绿灯商机</div>
      <div class="card-value val-green"><span id="v-opp-green" class="skeleton"></span><span class="card-unit">个</span></div>
    </div>
    <div class="card">
      <div class="card-label">🟡 黄灯商机</div>
      <div class="card-value val-yellow"><span id="v-opp-yellow" class="skeleton"></span><span class="card-unit">个</span></div>
    </div>
    <div class="card">
      <div class="card-label">🔴 红灯商机</div>
      <div class="card-value val-red"><span id="v-opp-red" class="skeleton"></span><span class="card-unit">个</span></div>
    </div>
  </div>

  <!-- 销售年度累计数据 -->
  <div class="group-label">销售年度累计数据</div>
  <div class="sales-table-wrap">
    <div class="sales-table-header">
      <span class="sales-table-title">按销售人员统计</span>
      <span class="sales-year-tag" id="salesYearTag">2026年</span>
    </div>
    <div class="sales-table-scroll">
      <table class="sales-table" id="salesTable">
        <thead>
          <tr>
            <th>销售</th>
            <th>年度目标</th>
            <th>年度成交金额</th>
            <th>成交商机数</th>
            <th>在跟商机数</th>
            <th>客户数量</th>
            <th>客户拜访</th>
            <th>客户接待</th>
          </tr>
        </thead>
        <tbody id="salesTableBody">
          <tr><td colspan="8"><div class="sales-empty">加载中…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div><!-- .page end -->

<script>
  // ── 时钟 ──
  function tick() {
    const now = new Date();
    document.getElementById('topbarTime').textContent =
      now.toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'}) + ' ' +
      now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  }
  tick();
  setInterval(tick, 30000);

  // ── 后端地址（改成你的公网地址后重新上传 GitHub）──
  const API_BASE = 'http://localhost:8765';

  // ── 工具函数 ──
  function setVal(id, val, colorClass) {
    const el = document.getElementById(id);
    if (!el) return;
    if (val === null || val === -1) {
      el.className = 'val-error';
      el.textContent = '—';
    } else {
      el.className = colorClass || '';
      el.textContent = val;
    }
  }

  function setStatus(state, text) {
    const dot  = document.getElementById('statusDot');
    const span = document.getElementById('statusText');
    dot.className = 'status-dot ' + state;
    span.textContent = text;
  }

  const IDS = ['v-customer-total','v-customer-new','v-visit','v-reception',
               'v-clue-followup','v-clue-pending','v-opp-followup',
               'v-opp-total','v-opp-new','v-opp-green','v-opp-yellow','v-opp-red'];

  function resetSkeleton() {
    IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.className = 'skeleton'; el.textContent = ''; }
    });
  }

  // ── 金额格式化：元 → 万元 ──
  function fmtAmount(val) {
    if (val === null || val === undefined || val < 0) return '—';
    const wan = val / 10000;
    return wan === 0 ? '0' : (wan % 1 === 0 ? wan.toFixed(0) : wan.toFixed(2));
  }

  // ── 渲染销售年度表格 ──
  function renderSalesTable(list, year) {
    document.getElementById('salesYearTag').textContent = `${year}年`;
    const tbody = document.getElementById('salesTableBody');
    if (!list || list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="sales-empty">暂无数据</div></td></tr>';
      return;
    }
    tbody.innerHTML = list.map(row => {
      const target = (row.annual_target !== null && row.annual_target !== undefined)
        ? `${fmtAmount(row.annual_target)}<small style="color:#aaa;font-weight:400"> 万元</small>`
        : `<span class="target-null">待配置</span>`;
      const amt = row.deal_amount >= 0
        ? `<span class="amount-val">${fmtAmount(row.deal_amount)}</span><small style="color:#aaa"> 万元</small>`
        : '—';
      return `
        <tr>
          <td>${row.name || '—'}</td>
          <td>${target}</td>
          <td>${amt}</td>
          <td>${row.deal_count >= 0 ? row.deal_count : '—'}<small style="color:#aaa"> 个</small></td>
          <td>${row.active_opp >= 0 ? row.active_opp : '—'}<small style="color:#aaa"> 个</small></td>
          <td>${row.customer_count >= 0 ? row.customer_count : '—'}<small style="color:#aaa"> 个</small></td>
          <td>${row.visit_count >= 0 ? row.visit_count : '—'}<small style="color:#aaa"> 次</small></td>
          <td>${row.reception_count >= 0 ? row.reception_count : '—'}<small style="color:#aaa"> 次</small></td>
        </tr>`;
    }).join('');
  }

  // ── 加载销售年度统计 ──
  async function loadSalesStats() {
    const tbody = document.getElementById('salesTableBody');
    tbody.innerHTML = '<tr><td colspan="8"><div class="sales-empty"><span class="table-skeleton"></span></div></td></tr>';
    try {
      const resp = await fetch(`${API_BASE}/api/sales_stats`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const d = await resp.json();
      renderSalesTable(d.list, d.year);
    } catch(e) {
      console.error('销售统计加载失败:', e);
      tbody.innerHTML = '<tr><td colspan="8"><div class="sales-empty">加载失败，请确认后端已启动</div></td></tr>';
    }
  }

  // ── 加载指标卡数据 ──
  async function loadDashboard() {
    const btn = document.getElementById('btnRefresh');
    btn.classList.add('loading');
    resetSkeleton();
    setStatus('loading', '正在加载…');

    // 两个接口并发
    const [dashResult] = await Promise.allSettled([
      fetch(`${API_BASE}/api/dashboard`)
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
      loadSalesStats(),
    ]);

    if (dashResult.status === 'fulfilled') {
      const d = dashResult.value;
      setVal('v-customer-total',  d.customer_total);
      setVal('v-customer-new',    d.customer_new_month);
      setVal('v-visit',           d.visit_month);
      setVal('v-reception',       d.reception_month);
      setVal('v-clue-followup',   d.clue_followup_month);
      setVal('v-clue-pending',    d.clue_pending);
      setVal('v-opp-followup',    d.opp_followup_month);
      setVal('v-opp-total',       d.opp_total);
      setVal('v-opp-new',         d.opp_new_month);
      setVal('v-opp-green',       d.opp_green);
      setVal('v-opp-yellow',      d.opp_yellow);
      setVal('v-opp-red',         d.opp_red);

      const t = new Date();
      setStatus('', `更新于 ${t.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`);
      document.getElementById('statusDot').style.background = '#52c41a';
    } else {
      console.error(dashResult.reason);
      setStatus('error', '加载失败，请确认后端已启动');
    }

    btn.classList.remove('loading');
  }

  loadDashboard();
  setInterval(loadDashboard, 5 * 60 * 1000);
</script>
</body>
</html>
